<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeTOP Community</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
    <div class="main-banner-fragments-plan">
        <h1>커뮤니티</h1>
        <p><small>게시판(Boards) 목록 - 광장 | 마켓 | 소통 (a 태그 & href 연결)</small></p>
    </div>
    <div class="category-banner-fragments-plan">
        <h2>광장</h2>
        <p><small>카테고리(Categories) 목록 - 전체(all) | 자유(free) | 토론(debate) (a 태그 & href 연결)</small></p>
    </div>
    <p>태그(tags)</p>

    <div class="postList-container">
        <table th:if="${not #lists.isEmpty(posts)}">
            <tr>
                <th>카테고리</th>
                <th>제목</th>
                <th>댓글수</th>
                <th>작성자</th>
                <th>조회수</th>
                <th>작성일</th>
            </tr>
            <tr th:each="post : ${posts}">
                <td th:text="${post.categoryId}"></td>
                <td><a th:href="@{/community/{id}(id=${post.postId})}" th:text="${post.title}"></a></td>
                <td th:text="${post.commentCount}"></td>
                <td th:text="${post.writerId}"></td>
                <td th:text="${post.viewCount}"></td>
                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></td>
            </tr>
        </table>
    </div>
    <div >
        <a th:href="@{/community/write}" class="btn add-post-btn">글 작성</a>
    </div>

    <p th:if="${#lists.isEmpty(posts)}" class="no-data">게시글이 없습니다.<br>새 게시글을 작성해보세요!</p>
</body>
</html>
