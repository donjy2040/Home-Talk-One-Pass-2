<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>민원 상세 정보</title>
</head>
<body>
<h2 th:text="${complaint.title}">제목</h2>
<p>분류: <span th:text="${complaint.category}">분류</span></p>
<p>작성일: <span th:text="${#temporals.format(complaint.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span></p>

<p>상태:
    <span th:if="${complaint.status == '처리완료'}" style="color: blue;" th:text="${complaint.status}"></span>

    <span th:unless="${complaint.status == '처리완료'}" style="color: red;" th:text="${complaint.status}"></span>
</p>
<hr>

<div th:text="${complaint.content}">내용이 출력됩니다.</div>

<div th:if="${not #lists.isEmpty(complaint.attachments)}">
    <h3>첨부파일</h3>
    <ul>
        <li th:each="file : ${complaint.attachments}">
            <img th:src="@{/api/complaints/display(fileName=${file.storedFileName})}" width="300"><br>
            <a th:href="@{/api/complaints/download/{id}(id=${file.id})}" th:text="${file.originFileName}">파일명</a>
        </li>
    </ul>
</div>

<div th:if="${complaint.answer != null}" style="background-color: #f9f9f9; padding: 15px; margin-top: 20px;">
    <hr>
    <h3>관리자 답변</h3>
    <p th:text="${complaint.answer}">답변 내용</p>
</div>

<div class="admin-only" style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
    <h3>관리자 답변 등록</h3>
    <form th:action="@{/api/complaints/{id}/respond(id=${complaint.id})}" method="post">
        <textarea name="response" rows="5" style="width: 100%;" placeholder="여기에 답변을 입력하세요..."></textarea><br>
        <button type="submit" style="margin-top: 10px;">답변 저장하기</button>
    </form>
</div>

<hr>
<a th:href="@{/complaints/list}">목록보기</a> <a th:href="@{/complaints/edit/{id}(id=${complaint.id})}">수정하기</a>
</body>
</html>
